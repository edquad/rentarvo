name: Deploy to AWS (CodeBuild)

on:
  push:
    branches: [ main, develop ]

env:
  AWS_REGION: us-east-1

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Trigger CodeBuild for API
        run: |
          aws codebuild start-build-batch \
            --project-name rentarvo-api-build \
            --environment-variables-override "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }},AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" \
            --region ${{ env.AWS_REGION }}

  deploy-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Trigger CodeBuild for UI
        run: |
          aws codebuild start-build-batch \
            --project-name rentarvo-ui-build \
            --environment-variables-override "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }},AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" \
            --region ${{ env.AWS_REGION }}
